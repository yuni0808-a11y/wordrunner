function scaleCanvas(){
  const dpr=window.devicePixelRatio||1;
  const s=Math.min(window.innerWidth/W,window.innerHeight/H);
  const cssW=Math.round(W*s),cssH=Math.round(H*s);
  canvas.style.width=cssW+'px';canvas.style.height=cssH+'px';
  canvas.width=cssW*dpr;canvas.height=cssH*dpr;
  // 게임 좌표계(800×480)로 자동 매핑
  ctx.setTransform(s*dpr,0,0,s*dpr,0,0);
}

let actx=null;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();}
function xyl(freq,dur=0.2,vol=0.25,delay=0){
  if(!actx||freq<=0)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  o.type='sine';o.frequency.value=freq;
  const t=actx.currentTime+delay;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.006);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur+0.01);
}

function rr(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

const _emojiCache={};
function drawEmoji(em,cx,cy,size){
  if(!_emojiCache[em]){
    const svg=`<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'>
      <text y='82' font-size='80' text-anchor='middle' x='50'>${em}</text></svg>`;
    const img=new Image();
    img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
    _emojiCache[em]=img;
  }
  const img=_emojiCache[em];
  if(img.complete&&img.naturalWidth>0){
    ctx.save();ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
    ctx.drawImage(img,cx-size/2,cy-size/2,size,size);
    ctx.restore();
  }
}

function buildEmojiCache(){
  unitEmojiCache={};const used=new Set();
  for(const w of wordList){

    if(em&&!used.has(em)){unitEmojiCache[w.word]=em;used.add(em);}
    else{unitEmojiCache[w.word]=null;}
  }
}

// ═══ SPAWNING ═══
const COIN_LANES=[GY-68,GY-118,GY-175];
function spawnCoins(dt){
  coinTimer+=dt;
  const interval=isFever?700:(stagePhase==='playing'&&gameStage===1)?2200:1600;
  if(coinTimer<interval)return;coinTimer=0;
  if(allDone||!uncollected.length)return;
  const onScreen=new Set(coins.map(c=>c.word));
  const avail=uncollected.filter(w=>!onScreen.has(w.word));
  if(!avail.length)return;
  const wd=avail[Math.floor(Math.random()*avail.length)];
  const lane=COIN_LANES[Math.floor(Math.random()*COIN_LANES.length)];
  coins.push({x:W+55,y:lane,vx:-(gameSpeed+2),word:wd.word,ko:wd.ko,radius:38,bob:Math.random()*Math.PI*2});
  if(!isFever&&Math.random()<0.4){
    const av2=avail.filter(w=>w.word!==wd.word);
    if(av2.length){
      const w2=av2[Math.floor(Math.random()*av2.length)];
      const ln2=COIN_LANES[(COIN_LANES.indexOf(lane)+1)%COIN_LANES.length];
      setTimeout(()=>{if(scene==='GAME')coins.push({x:W+55,y:ln2,vx:-(gameSpeed+2),word:w2.word,ko:w2.ko,radius:38,bob:Math.random()*Math.PI*2});},650);
    }
  }
}
function spawnObstacle(dt){
  if(isFever||allDone||stagePhase!=='playing')return;
  obsTimer+=dt;
  const interval=gameStage===1?3800:2400;
  if(obsTimer<interval)return;obsTimer=0;
  // Stage 1: only cones; Stage 2: mixed
  const pool=gameStage===1?['cone','villain','cone','cone']:['cone','puddle','villain','cone','puddle','villain'];
  const type=pool[Math.floor(Math.random()*pool.length)];
  let y,w,h;
  if(type==='cone'){y=GY-55;w=32;h=50;}
  else if(type==='puddle'){y=GY-16;w=68;h=18;}
  else{y=GY-95;w=44;h=45;}
  obstacles.push({x:W+60,y,w,h,type,vx:-(gameSpeed+0.8),bob:0});
}

// ═══ COLLISION ═══
function coinCollide(c){
  const cH=C.sliding?22:62;const cy=C.y-cH/2+CHAR_FEET/2;
  return Math.abs(c.x-C.x)<22+c.radius*.5&&Math.abs(c.y-cy)<cH/2+c.radius*.48;
}
function obsCollide(o){
  if(invincibleActive)return false; // 무적 중 충돌 없음
  const cTop=C.sliding?C.y-4:C.y-44;const cBot=C.y+CHAR_FEET;
  const cL=C.x-13,cR=C.x+13;
  if(cR<=o.x||cL>=o.x+o.w||cBot<=o.y||cTop>=o.y+o.h)return false;
  if(o.type==='cone'&&C.y<GY-78)return false;
  if((o.type==='puddle'||o.type==='villain')&&C.sliding)return false;
  return true;
}

// ═══ UPDATE ═══
function update(dt){
  if(scene!=='GAME')return;

  // Typewriter (also runs in lobby via loop)
  // Stage transition
  if(stagePhase==='feverEnd'){
    stageFadeTimer-=dt;
    if(stageFadeTimer<=0){
      gameStage=2;stagePhase='playing';
      uncollected=shuffle([...wordList]);collected=[];
      gameSpeed=S2_SPEED;combo=0;
    }
    return; // freeze game during transition
  }

  if(C.entering){
    C.y+=C.vy;C.vy+=GRAVITY*.4;
    if(C.y>=GY-CHAR_FEET){C.y=GY-CHAR_FEET;C.vy=0;C.onGround=true;C.entering=false;jumpCount=0;spawnDust(C.x,GY,8);sfx.land();}
    return;
  }

  // Popup timer — score/display updates AFTER popup closes
  if(popupTimer>0){
    popupTimer-=dt;
    if(popupTimer<=0&&pendingPts>0){
      displayScore+=pendingPts;
      scoreFloaters.push({x:W/2,y:H/2+55,text:'+'+pendingPts,life:1.5,vy:-1.5,color:pendingPts>NORMAL_SCORE?'#F59E0B':'#60A8F0'});
      pendingPts=0;
    }
    return;
  }

  if(!C.onGround){
    C.vy+=GRAVITY;C.y+=C.vy;
    const gnd=GY-(C.sliding?10:CHAR_FEET);
    if(C.y>=gnd){C.y=gnd;C.vy=0;C.onGround=true;jumpCount=0;isDoubleJumping=false;doubleJumpSpin=0;spawnDust(C.x,GY,5);}
  }

  C.ft+=dt;if(C.ft>110){C.frame=(C.frame+1)%4;C.ft=0;}
  if(C.invincible){C.invTimer-=dt;if(C.invTimer<=0)C.invincible=false;}
  if(charMoodTimer>0){charMoodTimer-=dt;if(charMoodTimer<=0)charMood=isFever?'fever':'normal';}
  // 속도 부스트
  if(speedUpMsgTimer>0)speedUpMsgTimer-=dt;
  if(invincibleActive){invincibleTimer-=dt;if(invincibleTimer<=0){invincibleActive=false;if(!speedBoostActive)gameSpeed=gameStage===2?S2_SPEED:S1_SPEED;}}
  if(speedBoostActive){speedBoostTimer-=dt;if(speedBoostTimer<=0){speedBoostActive=false;gameSpeed=gameStage===2?S2_SPEED:S1_SPEED;}}
  // 비 효과
  if(rainActive){rainTimer-=dt;rainDropTimer+=dt;if(rainTimer<=0)rainActive=false;
    else if(rainDropTimer>600){rainDropTimer=0;obstacles.push({x:W+60,y:GY-16,w:68,h:18,type:'puddle',vx:-(gameSpeed+.8),bob:0});}}
  // 악당 폭격
  if(villainSurgeActive){villainSurgeTimer-=dt;villainSurgeSpawnTimer+=dt;if(villainSurgeTimer<=0)villainSurgeActive=false;
    else if(villainSurgeSpawnTimer>1000){villainSurgeSpawnTimer=0;obstacles.push({x:W+60,y:GY-80,w:44,h:50,type:'villain',vx:-(gameSpeed+.8),bob:0});}}
  // 특수 아이템 스폰 (8~20초 간격)
  if(stagePhase==='playing'&&!allDone){
    specialItemTimer+=dt;
    // 하트 위기 시 더 빠르게 스폰
      const spawnInterval=hearts<=1?5000:hearts<=2?8000:12000+Math.random()*8000;
    if(specialItemTimer>spawnInterval&&specialItems.length===0){
      specialItemTimer=0;
      let type;
      if(hearts<=2){
        type='heart'; // 하트 1~2개: 반드시 하트 아이콘 제공
      } else {
        const t=gameStage===2?['boot','rain','villain','invincible']:['boot','villain','invincible'];
        type=t[Math.floor(Math.random()*t.length)];
      }
      const lane=COIN_LANES[Math.floor(Math.random()*COIN_LANES.length)];
      specialItems.push({x:W+55,y:lane,type,vx:-(gameSpeed+1.5),bob:Math.random()*Math.PI*2,sparkAngle:0});
    }
  }
  // 특수 아이템 이동 + 충돌
  for(let i=specialItems.length-1;i>=0;i--){
    const si=specialItems[i];si.x+=si.vx;si.bob+=dt*.003;si.sparkAngle+=dt*.004;
    if(si.x<-80){specialItems.splice(i,1);continue;}
    const cH=C.sliding?22:62,cy=C.y-cH/2+CHAR_FEET/2;
    if(Math.abs(si.x-C.x)<30&&Math.abs(si.y-cy)<cH/2+26){
      specialItems.splice(i,1);
      applySpecialItem(si.type);
    }
  }
  if(isDoubleJumping){doubleJumpSpin+=dt*.013;if(doubleJumpSpin>=Math.PI*2){doubleJumpSpin=0;isDoubleJumping=false;}}

  // Slide dust
  if(C.sliding&&C.onGround&&Math.random()<0.25){
    dustParticles.push({x:C.x-15-Math.random()*10,y:GY-2,vx:-(Math.random()*2+1),vy:-(Math.random()*1.5+.5),life:0.8,size:5+Math.random()*8});
  }

  // Fever timer
  if(isFever){
    feverTimer-=dt;
    if(feverTimer<=0){
      isFever=false;combo=0;charMood='normal';
      if(stagePhase==='fever'){
        sfx.feverEnd();
        stagePhase='feverEnd';stageFadeTimer=2200;
      }
    }
  }

  bgX1=(bgX1+gameSpeed*.04)%W;
  bgX2=(bgX2+gameSpeed*.12)%W;

  if(stagePhase==='fever'){feverStarTimer+=dt;if(feverStarTimer>280){feverStarTimer=0;const lane=COIN_LANES[Math.floor(Math.random()*COIN_LANES.length)];coins.push({x:W+40,y:lane,vx:-(gameSpeed+3.5),word:'_star_',ko:'★',radius:24,bob:Math.random()*Math.PI*2,isStar:true});}}
  else{spawnCoins(dt);}
  spawnObstacle(dt);

  for(let i=coins.length-1;i>=0;i--){
    const c=coins[i];c.x+=c.vx;c.bob+=dt*.003;
    if(c.x<-80){coins.splice(i,1);continue;}
    if(!C.invincible&&coinCollide(c)){
      const cc=coins.splice(i,1)[0];
      if(cc.isStar){
        const pts=5;score+=pts;displayScore+=pts;
        scoreFloaters.push({x:cc.x,y:cc.y,text:'+5',life:1.2,vy:-2,color:'#FFD700'});
        spawnStars(cc.x,cc.y,8,'#FFD700');sfx.collect();
      } else { collectWord(cc); }
    }
  }
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];o.x+=o.vx;o.bob+=dt*.004;
    if(o.x<-120){obstacles.splice(i,1);continue;}
    if(!C.invincible&&obsCollide(o)){obstacles.splice(i,1);takeDamage();}
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=dt/600;
    if(p.life<=0)particles.splice(i,1);
  }
  for(let i=dustParticles.length-1;i>=0;i--){
    const d=dustParticles[i];d.x+=d.vx;d.y+=d.vy;d.vy+=.05;d.life-=dt/500;
    if(d.life<=0)dustParticles.splice(i,1);
  }
  for(let i=scoreFloaters.length-1;i>=0;i--){
    const f=scoreFloaters[i];f.y+=f.vy;f.life-=dt/1000;
    if(f.life<=0)scoreFloaters.splice(i,1);
  }
  if(allDone){endTimer-=dt;if(endTimer<=0){scene='RESULT';stopBGM();}}
}

function collectWord(coin){
  const idx=uncollected.findIndex(w=>w.word===coin.word);
  if(idx===-1)return;
  const wo=uncollected[idx];uncollected.splice(idx,1);collected.push(wo);
  const pts=NORMAL_SCORE*(isFever?FEVER_MULT:1);
  score+=pts;combo++;
  charMood='happy';charMoodTimer=1200;
  popupWord={...wo,pts};pendingPts=pts;popupTimer=1800;
  speak(wo.word);
  spawnStars(coin.x,coin.y,10,isFever?'#F59E0B':'#A8D8FF');sfx.collect();
  if(!isFever&&combo>=FEVER_COMBO){isFever=true;feverTimer=FEVER_DURATION;charMood='fever';sfx.fever();}
  if(!uncollected.length){
    if(gameStage===1){
      // Stage 1 complete → start fever between stages
      isFever=true;feverTimer=4500;stagePhase='fever'; // 스테이지 사이 짧은 피버
      charMood='fever';sfx.fever();
    } else {
      // Stage 2 complete
      displayScore=score;allDone=true;endTimer=gameStage===2?2800:1500;resultScrollY=0;
      gameResult='success';sfx.complete();charMood='happy';
    }
  }
}
function takeDamage(){
  hearts--;combo=0;isFever=false;
  charMood='sad';charMoodTimer=1500;
  C.invincible=true;C.invTimer=1800;sfx.hit();
  spawnStars(C.x,C.y,8,'#FF6060');
  if(hearts<=0){displayScore=score;gameResult='fail';resultScrollY=0;sfx.gameover();setTimeout(()=>{scene='RESULT';stopBGM();},900);}
}

// ═══ PARTICLES ═══
function applySpecialItem(type){
  sfx.collect();
  spawnStars(C.x,C.y,12,'#FFD700');
  if(type==='heart'){
    if(hearts<3){hearts++;charMood='happy';charMoodTimer=1200;
      scoreFloaters.push({x:C.x,y:C.y-20,text:'❤️ +1',life:1.5,vy:-1.8,color:'#FF4D6D'});}
    else{scoreFloaters.push({x:C.x,y:C.y-20,text:'❤️ MAX',life:1.2,vy:-1.5,color:'#FF9999'});}
  } else if(type==='boot'){

    const prevSpeed=gameSpeed;gameSpeed=prevSpeed*1.6;
    scoreFloaters.push({x:C.x,y:C.y-20,text:'⚡ SPEED UP!',life:1.5,vy:-1.8,color:'#FFD700'});
  } else if(type==='rain'){
    rainActive=true;rainTimer=7000;rainDropTimer=0;
    scoreFloaters.push({x:C.x,y:C.y-20,text:'🌧️ +',life:1.5,vy:-1.8,color:'#60A8F0'});
  } else if(type==='invincible'){
    invincibleActive=true;invincibleTimer=5000;

function spawnStars(x,y,n,color){
  for(let i=0;i<n;i++){
    const a=(i/n)*Math.PI*2,sp=1.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,color,size:3+Math.random()*5});
  }
}
function spawnDust(x,y,n){
  for(let i=0;i<n;i++){
    const a=Math.PI+Math.random()*Math.PI;
    const sp=1+Math.random()*2.5;
    dustParticles.push({x:x+Math.random()*20-10,y:y-Math.random()*5,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,life:0.7+Math.random()*.4,
      size:4+Math.random()*10});
  }
}

// ═══ DRAW: BACKGROUND ═══
function drawBG(){
  const t=Date.now();

  if(gameStage===1){
    // ── Stage 1: 밝은 낮 공원 ──
    const sky=ctx.createLinearGradient(0,0,0,GY);
    sky.addColorStop(0,'#3A9CE8');sky.addColorStop(.6,'#7CCAF0');sky.addColorStop(1,'#C4E8F8');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

    // 구름
    ctx.fillStyle='rgba(255,255,255,.85)';
    for(let i=0;i<3;i++){const cx=((i*260-bgX1*16)+W+260)%(W+260)-130;drawSimpleCloud(cx,54+i%3*28,.84+i%3*.14);}

    // 잔디
    const gr=ctx.createLinearGradient(0,GY,0,H);
    gr.addColorStop(0,'#72C858');gr.addColorStop(1,'#48A038');
    ctx.fillStyle=gr;ctx.fillRect(0,GY,W,H-GY);
    ctx.fillStyle='rgba(255,255,255,.35)';ctx.fillRect(0,GY,W,3);
    // 도로 점선
    ctx.fillStyle='rgba(0,0,0,.05)';ctx.fillRect(0,GY+5,W,20);
    ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=2;ctx.setLineDash([20,14]);
    ctx.beginPath();ctx.moveTo(0,GY+15);ctx.lineTo(W,GY+15);ctx.stroke();ctx.setLineDash([]);

  } else {
    // ── Stage 2: 밝은 아침/낮 경기장 ──

    // 하늘: 맑고 밝은 낮 하늘
    const sky=ctx.createLinearGradient(0,0,0,GY);
    sky.addColorStop(0,'#2EB0F0');sky.addColorStop(.5,'#6CCEF8');
    sky.addColorStop(.85,'#B8E8FC');sky.addColorStop(1,'#D8F0FC');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

    // 구름 (밝은 흰 구름)
    ctx.fillStyle='rgba(255,255,255,.88)';
    for(let i=0;i<3;i++){const cx=((i*270-bgX1*16)+W+270)%(W+270)-135;drawSimpleCloud(cx,52+i%3*28,.86+i%3*.12);}

    // 원경 관중석 (밝은 낮 톤)
    ctx.fillStyle='rgba(60,110,180,.3)';
    const seatH=38;
    ctx.beginPath();
    ctx.moveTo(0,GY-seatH);
    for(let sx=0;sx<220;sx+=12)ctx.lineTo(sx,GY-seatH+(sx%24<12?0:5));
    ctx.lineTo(220,GY);ctx.lineTo(0,GY);ctx.closePath();ctx.fill();
    ctx.beginPath();
    ctx.moveTo(W,GY-seatH);
    for(let sx=W;sx>W-220;sx-=12)ctx.lineTo(sx,GY-seatH+((W-sx)%24<12?0:5));
    ctx.lineTo(W-220,GY);ctx.lineTo(W,GY);ctx.closePath();ctx.fill();

    // 트랙 바닥 (빨간 우레탄)
    const track=ctx.createLinearGradient(0,GY,0,H);
    track.addColorStop(0,'#C83818');track.addColorStop(.3,'#D84020');track.addColorStop(1,'#A82808');
    ctx.fillStyle=track;ctx.fillRect(0,GY,W,H-GY);

    // 트랙 상단 선
    ctx.fillStyle='rgba(255,220,180,.5)';ctx.fillRect(0,GY,W,3);

    // 레인 선 (흰 실선)
    ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=2.5;ctx.setLineDash([]);
    [GY+2,GY+22,GY+42,GY+62,GY+82,GY+102].forEach(ly=>{
      ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();
    });

    // 레인 안 점선
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;ctx.setLineDash([14,18]);
    [GY+12,GY+32,GY+52].forEach(ly=>{
      ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();
    });
    ctx.setLineDash([]);
  }

  // ── 공통: 피버 오버레이 ──
  if(stagePhase==='feverEnd'){
    const p=Math.min(1,1-stageFadeTimer/2200);
    const c2=ctx.createLinearGradient(0,0,0,GY);
    c2.addColorStop(0,'rgba(192,80,48,'+p.toFixed(2)+')');
    c2.addColorStop(1,'rgba(250,224,160,'+p.toFixed(2)+')');
    ctx.fillStyle=c2;ctx.fillRect(0,0,W,H);
  }
  if(isFever){
    const pulse=.05+.04*Math.sin(t*.006);
    ctx.fillStyle='rgba(255,200,0,'+pulse+')';ctx.fillRect(0,0,W,H);
  }
}
function drawSimpleCloud(x,y,sc){
  ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
  ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.arc(22,-7,22,0,Math.PI*2);
  ctx.arc(44,0,16,0,Math.PI*2);ctx.arc(22,8,14,0,Math.PI*2);ctx.fill();ctx.restore();
}

// ═══ DRAW: CHARACTER ═══
function drawChar(){
  if(C.invincible&&Math.floor(Date.now()/90)%2===0)return;
  // 학교 입장: 문 앞에서 캐릭터 페이드 아웃
  let charAlpha=1;
  if(allDone&&gameStage===2&&gameResult==='success'){
    const elapsed=2800-endTimer;
    if(elapsed>1900){charAlpha=Math.max(0,1-Math.min(1,(elapsed-1900)/400));}
  }
  const sw=Math.sin(C.frame*Math.PI/2)*10;
  ctx.save();
  if(charAlpha<1)ctx.globalAlpha=charAlpha;
  ctx.translate(C.x,C.y);
  if(C.onGround&&!C.sliding){
    const bounce=Math.abs(Math.sin(C.frame*Math.PI/2))*2.5;
    ctx.translate(0,-bounce);
  }
  if(isDoubleJumping&&doubleJumpSpin>0)ctx.rotate(doubleJumpSpin);
  C.sliding?drawBoxSlide():drawBoxRun(sw,!C.onGround);
  // 무적 중 황금 글로우 아웃라인
  if(invincibleActive){
    const ia=0.6+0.35*Math.sin(Date.now()*.012);
    ctx.strokeStyle=`rgba(255,215,0,${ia})`;ctx.lineWidth=3;ctx.lineJoin='round';
    rr(-28,-56,56,56,12);ctx.stroke();
    ctx.strokeStyle=`rgba(255,255,200,${ia*.5})`;ctx.lineWidth=6;
    rr(-28,-56,56,56,12);ctx.stroke();
  }
  ctx.restore();
}

function drawBoxFace(bx,by,bd,mood){
  const fcx=bx+bd/2,fcy=by+bd*.34;
  const es=bd*.22,er=bd*.1;

  function dots(scY){
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.ellipse(fcx-es,fcy,er*.62,er*.62*scY,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(fcx+es,fcy,er*.62,er*.62*scY,0,0,Math.PI*2);ctx.fill();
  }

  if(mood==='lobby'){
    // 디폴트: 점 눈 + 환한 미소 + 깜박임
    const bH=charBlinkPhase===0?1:charBlinkPhase===2?.04:.3;
    dots(bH);
    ctx.strokeStyle='#111';ctx.lineWidth=2.5;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(fcx,fcy+er*2.2,er*1.4,.12,Math.PI-.12);ctx.stroke();
  } else if(mood==='happy'){
    // 기쁨: 아치 눈 + 큰 미소
    ctx.strokeStyle='#111';ctx.lineWidth=2.8;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(fcx-es,fcy,er*.9,Math.PI,0);ctx.stroke();
    ctx.beginPath();ctx.arc(fcx+es,fcy,er*.9,Math.PI,0);ctx.stroke();
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(fcx,fcy+er*2,er*1.3,.1,Math.PI-.1);ctx.stroke();

  } else if(mood==='sad'){
    // 슬픔: 점 눈 + 처진 눈썹 + 찡그린 입
    dots(1);
    ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(fcx-es-er,fcy-er*1.8);ctx.lineTo(fcx-es+er,fcy-er*1.1);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fcx+es-er,fcy-er*1.1);ctx.lineTo(fcx+es+er,fcy-er*1.8);ctx.stroke();
    ctx.beginPath();ctx.arc(fcx,fcy+er*2.8,er*1.1,Math.PI+.2,2*Math.PI-.2);ctx.stroke();
  } else if(mood==='fever'){
    // 피버: 한쪽 점 눈 + 한쪽 윙크(가로선) + 스머그
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.arc(fcx-es,fcy,er*.62,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#111';ctx.lineWidth=2.8;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(fcx+es-er*.9,fcy);ctx.lineTo(fcx+es+er*.9,fcy);ctx.stroke();
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(fcx-es-er*1.1,fcy-er*2);ctx.lineTo(fcx-es+er*.8,fcy-er*2.8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fcx+es-er*.8,fcy-er*2.8);ctx.lineTo(fcx+es+er*1.1,fcy-er*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fcx-es*.9,fcy+er*2.2);
    ctx.quadraticCurveTo(fcx,fcy+er*2.9,fcx+es*.8,fcy+er*1.8);ctx.stroke();
  } else {
    // 게임 시: 점 눈 + 집중 눈썹 + 직선 입
    dots(1);
    ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(fcx-es-er*1.1,fcy-er*1.9);ctx.lineTo(fcx-es+er*.7,fcy-er*1.2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fcx+es-er*.7,fcy-er*1.2);ctx.lineTo(fcx+es+er*1.1,fcy-er*1.9);ctx.stroke();
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(fcx-es*.55,fcy+er*2.1);ctx.lineTo(fcx+es*.55,fcy+er*2.1);ctx.stroke();
  }
}

function drawBoxLeg(hipX,hipY,swing,lighter){
  const fy=CHAR_FEET; // 발이 지면에 닿도록
  const kx=hipX+swing*.28,ky=hipY+(fy-hipY)*.45,fx=kx-swing*.15,col=lighter?'#5AAAE0':'#2268B8';
  ctx.strokeStyle=col;ctx.lineWidth=6;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(hipX,hipY);ctx.lineTo(kx,ky);ctx.lineTo(fx,fy);ctx.stroke();
  ctx.fillStyle=col;ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(fx+2,fy,7,3.5,-.08,0,Math.PI*2);ctx.fill();ctx.stroke();
}

function drawBoxRun(sw,jumping){
  const tilt=jumping?-0.14:-0.22;ctx.rotate(tilt);
  const BD=56,BX=-28,BY=-56;
  const mood=charMood;
  const armSw=sw*.16;
  const armY=BY+BD*.66;
  const bagBob=Math.sin(Date.now()*.003)*1.4;

  // ── 몸통 뒤: 다리 + 팔 + 가방 ──
  drawBoxLeg(6,BY+BD,-sw,false);
  drawBoxLeg(-6,BY+BD,sw,true);

  // 팔 (다리와 같은 색, 손 일체형)
  const fArmCol='#5AAAE0',bArmCol='#2268B8';
  ctx.lineCap='round';ctx.lineWidth=9;
  if(jumping){
    ctx.strokeStyle=fArmCol;
    ctx.beginPath();ctx.moveTo(BX+BD,armY);ctx.lineTo(BX+BD+14,armY-16);ctx.stroke();
    ctx.strokeStyle=bArmCol;
    ctx.beginPath();ctx.moveTo(BX,armY);ctx.lineTo(BX-12,armY+8);ctx.stroke();
  } else {
    ctx.strokeStyle=fArmCol;
    ctx.beginPath();ctx.moveTo(BX+BD,armY);ctx.lineTo(BX+BD+13,armY+armSw);ctx.stroke();
    ctx.strokeStyle=bArmCol;
    ctx.beginPath();ctx.moveTo(BX,armY);ctx.lineTo(BX-11,armY-armSw);ctx.stroke();
  }
  // 가방 (몸통 뒤)
  ctx.save();
  ctx.translate(BX-6,BY+BD*.84+bagBob);ctx.rotate(.1+bagBob*.04);
  ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.ellipse(2,7,11,4,.1,0,Math.PI*2);ctx.fill();
  const bg=ctx.createLinearGradient(-10,-4,10,12);bg.addColorStop(0,'#2D6B40');bg.addColorStop(1,'#1A5030');
  ctx.fillStyle=bg;rr(-10,-4,20,16,4);ctx.fill();
  ctx.fillStyle='#245C38';rr(-10,-4,20,7,3);ctx.fill();
  ctx.strokeStyle='#0F3820';ctx.lineWidth=1.5;rr(-10,-4,20,16,4);ctx.stroke();
  ctx.fillStyle='#C8A830';ctx.fillRect(-3,2,6,4);
  ctx.fillStyle='#FFD040';ctx.fillRect(-2,2.5,4,3);
  ctx.restore();
  ctx.strokeStyle='#1A5A30';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(BX+BD*.75,BY+BD*.12);
  ctx.quadraticCurveTo(BX+BD*.2,BY+BD*.48,BX-6,BY+BD*.84+bagBob*.5);
  ctx.stroke();

  // ── 몸통 (앞) ──
  const bodyGr=ctx.createLinearGradient(BX,BY,BX+BD,BY+BD);
  bodyGr.addColorStop(0,'#7CCCFF');bodyGr.addColorStop(.5,'#3A9AEE');bodyGr.addColorStop(1,'#1A68D8');
  ctx.fillStyle=bodyGr;rr(BX,BY,BD,BD,12);ctx.fill();
  ctx.strokeStyle='#0A50A8';ctx.lineWidth=2.5;rr(BX,BY,BD,BD,12);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.22)';rr(BX+4,BY+4,BD-14,12,5);ctx.fill();
  drawBoxFace(BX,BY,BD,mood);
}

function drawBoxSlide(){
  ctx.save();ctx.translate(4,10);ctx.rotate(.44);
  const BD=56,BX=-28,BY=-44;
  const armY=BY+BD*.66;

  // ── 몸통 뒤: 다리 + 팔 ──
  ctx.strokeStyle='#2268B8';ctx.lineWidth=6;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(6,BY+BD);ctx.lineTo(14,BY+BD+14);ctx.stroke();
  ctx.fillStyle='#2268B8';ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.ellipse(15,BY+BD+16,7,3.5,-.25,0,Math.PI*2);ctx.fill();

  ctx.strokeStyle='#5AAAE0';ctx.lineWidth=6;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-8,BY+BD);ctx.lineTo(-16,BY+BD+14);ctx.stroke();
  ctx.fillStyle='#5AAAE0';ctx.beginPath();ctx.ellipse(-17,BY+BD+16,7,3.5,-.3,0,Math.PI*2);ctx.fill();

  ctx.lineWidth=9;ctx.lineCap='round';
  ctx.strokeStyle='#5AAAE0';
  ctx.beginPath();ctx.moveTo(BX+BD,armY);ctx.lineTo(BX+BD+14,armY-4);ctx.stroke();
  ctx.strokeStyle='#2268B8';
  ctx.beginPath();ctx.moveTo(BX,armY);ctx.lineTo(BX-12,armY+4);ctx.stroke();
  // 가방 (슬라이드)
  const bagBobS=Math.sin(Date.now()*.003)*1.0;
  ctx.save();
  ctx.translate(BX-6,BY+BD*.84+bagBobS);ctx.rotate(.15+bagBobS*.04);
  ctx.fillStyle='rgba(0,0,0,.12)';ctx.beginPath();ctx.ellipse(2,7,11,4,.1,0,Math.PI*2);ctx.fill();
  const bgS=ctx.createLinearGradient(-10,-4,10,12);bgS.addColorStop(0,'#2D6B40');bgS.addColorStop(1,'#1A5030');
  ctx.fillStyle=bgS;rr(-10,-4,20,16,4);ctx.fill();
  ctx.fillStyle='#245C38';rr(-10,-4,20,7,3);ctx.fill();
  ctx.strokeStyle='#0F3820';ctx.lineWidth=1.5;rr(-10,-4,20,16,4);ctx.stroke();
  ctx.fillStyle='#C8A830';ctx.fillRect(-3,2,6,4);
  ctx.restore();
  ctx.strokeStyle='#1A5A30';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(BX+BD*.75,BY+BD*.12);
  ctx.quadraticCurveTo(BX+BD*.2,BY+BD*.48,BX-6,BY+BD*.84+bagBobS*.5);
  ctx.stroke();

  // ── 몸통 (앞) ──
  const bodyGr=ctx.createLinearGradient(BX,BY,BX+BD,BY+BD);
  bodyGr.addColorStop(0,'#7CCCFF');bodyGr.addColorStop(.5,'#3A9AEE');bodyGr.addColorStop(1,'#1A68D8');
  ctx.fillStyle=bodyGr;rr(BX,BY,BD,BD,12);ctx.fill();
  ctx.strokeStyle='#0A50A8';ctx.lineWidth=2.5;rr(BX,BY,BD,BD,12);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.22)';rr(BX+4,BY+4,BD-14,12,5);ctx.fill();

  ctx.strokeStyle='rgba(80,120,180,.22)';ctx.lineWidth=2;ctx.lineCap='round';

// ═══ DRAW: COINS ═══
function drawStarCoin(c){
  const bob=Math.sin(c.bob)*6;
  ctx.save();ctx.translate(c.x,c.y+bob);
  const r=c.radius;
  ctx.shadowColor='#FFD700';ctx.shadowBlur=20;
  // Outer glow circle
  ctx.fillStyle='rgba(255,220,50,.25)';ctx.beginPath();ctx.arc(0,0,r+6,0,Math.PI*2);ctx.fill();
  // Star shape
  // 귀여운 둥근 별 (bezier curve)
  ctx.fillStyle='#FFE040';
  ctx.beginPath();
  for(let s=0;s<5;s++){
    const aOut=s*Math.PI*2/5-Math.PI/2;
    const aIn=aOut+Math.PI/5;
    const aNext=aOut+Math.PI*2/5;
    const ox=Math.cos(aOut)*r,oy=Math.sin(aOut)*r;
    const ix=Math.cos(aIn)*r*.48,iy=Math.sin(aIn)*r*.48;
    const nox=Math.cos(aNext)*r,noy=Math.sin(aNext)*r;
    if(s===0)ctx.moveTo(ox,oy);else ctx.lineTo(ox,oy);
    // 둥근 안쪽 곡선
    ctx.quadraticCurveTo(ix*.7,iy*.7,ix,iy);
    ctx.quadraticCurveTo(ix*.7,iy*.7,nox,noy);
  }
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(200,130,0,.4)';ctx.lineWidth=1.5;ctx.stroke();
  // 하이라이트
  ctx.fillStyle='rgba(255,255,210,.55)';
  ctx.beginPath();ctx.ellipse(-r*.18,-r*.25,r*.32,r*.2,-.4,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawSpecialItems(){
  for(const si of specialItems){
    const bob=Math.sin(si.bob)*5;
    ctx.save();ctx.translate(si.x,si.y+bob);
    const t=Date.now();

    // 공통: 반짝이 링 (4방향 별)
    function sparkRing(r,color,n,phase){
      ctx.save();ctx.fillStyle=color;ctx.globalAlpha=.85;
      for(let k=0;k<n;k++){
        const a=k*Math.PI*2/n+phase;
        const sx=Math.cos(a)*r,sy=Math.sin(a)*r;
        ctx.save();ctx.translate(sx,sy);ctx.rotate(a+phase);
        ctx.beginPath();
        ctx.moveTo(0,-4);ctx.lineTo(1,-1);ctx.lineTo(4,0);ctx.lineTo(1,1);
        ctx.lineTo(0,4);ctx.lineTo(-1,1);ctx.lineTo(-4,0);ctx.lineTo(-1,-1);
        ctx.closePath();ctx.fill();
        ctx.restore();
      }
      ctx.restore();

function drawHUD(){
  const t=Date.now();
  // HUD 배경
  ctx.fillStyle='rgba(248,248,252,.94)';rr(0,0,W,66,0);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.07)';ctx.fillRect(0,65,W,2);

  ctx.fillStyle='rgba(0,0,0,.14)';rr(9,6,80,54,12);ctx.fill();
  const sg=ctx.createLinearGradient(8,4,8,58);
  sg.addColorStop(0,'#FFBB00');sg.addColorStop(1,'#FF8C00');
  ctx.fillStyle=sg;rr(8,4,80,54,12);ctx.fill();
  ctx.strokeStyle='rgba(160,80,0,.3)';ctx.lineWidth=2;rr(8,4,80,54,12);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.25)';rr(12,7,72,16,7);ctx.fill();
  ctx.save();ctx.font="700 9px 'Nunito',sans-serif";ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,.85)';ctx.fillText('SCORE',48,18);ctx.restore();
  ctx.save();ctx.font="900 23px 'Nunito',sans-serif";ctx.textAlign='center';ctx.lineJoin='round';
  ctx.strokeStyle='rgba(100,40,0,.3)';ctx.lineWidth=4;ctx.strokeText(displayScore,48,50);
  ctx.fillStyle='white';ctx.fillText(displayScore,48,50);ctx.restore();

  // ── Progress Bar (줄인 높이, 하트 침범 안 하는 길이) ──
  const bX=96, bY=10, bW=W-220, bH=32; // bW 줄여서 하트와 간격 확보
  const hW=bW/2;
  const totW=wordList.length||1;
  const s1p=gameStage===1?Math.min(collected.length/totW,1):1;
  const s2p=gameStage===2?Math.min(collected.length/totW,1):0;
  const isS2=gameStage===2;
  const pulse=isS2?0.1+0.08*Math.sin(t*.009):0;

  // 바 배경
  ctx.fillStyle='rgba(0,0,0,.14)';rr(bX+2,bY+3,bW,bH,10);ctx.fill();
  ctx.fillStyle='rgba(180,186,208,.3)';rr(bX,bY,bW,bH,10);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=1.5;rr(bX,bY,bW,bH,10);ctx.stroke();

  ctx.save();rr(bX,bY,bW,bH,10);ctx.clip();
  if(s1p>0){
    const g1=ctx.createLinearGradient(bX,0,bX+hW,0);
    g1.addColorStop(0,'#38BEF8');g1.addColorStop(.5,'#3B82F6');g1.addColorStop(1,'#2563EB');
    ctx.fillStyle=g1;ctx.fillRect(bX,bY,hW*s1p,bH);
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(bX+2,bY+3,hW*s1p-4,8);
    const sh=(t*.0004)%1;
    const sG=ctx.createLinearGradient(bX+hW*s1p*(sh-.15),0,bX+hW*s1p*(sh+.1),0);
    sG.addColorStop(0,'rgba(255,255,255,0)');sG.addColorStop(.5,'rgba(255,255,255,.18)');sG.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sG;ctx.fillRect(bX,bY,hW*s1p,bH);
  }
  if(s2p>0){
    const g2=ctx.createLinearGradient(bX+hW,0,bX+hW+hW*s2p,0);
    g2.addColorStop(0,'#FF6020');g2.addColorStop(.5,'#EF2020');g2.addColorStop(1,'#C01010');
    ctx.fillStyle=g2;ctx.fillRect(bX+hW,bY,hW*s2p,bH);
    ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(bX+hW+2,bY+3,hW*s2p-4,8);
  }
  if(isS2&&pulse>0){
    ctx.fillStyle=`rgba(255,60,0,${pulse})`;ctx.fillRect(bX+hW,bY,hW,bH);
  }
  ctx.restore();

  // 바 중간 구분선
  ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(bX+hW,bY+3);ctx.lineTo(bX+hW,bY+bH-3);ctx.stroke();

  // Stage 라벨 (바 안)
  ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.font="900 10px 'Nunito',sans-serif";
  ctx.fillStyle=!isS2?'white':'rgba(255,255,255,.5)';
  ctx.fillText('Stage 1',bX+hW/2,bY+bH/2);
  ctx.fillStyle=isS2?'white':'rgba(255,255,255,.32)';
  ctx.fillText('Stage 2',bX+hW+hW/2,bY+bH/2);
  ctx.restore();

  // ── 페이지네이션 (바 아래) ──
  ctx.save();ctx.font="bold 10px 'Nunito',sans-serif";ctx.textAlign='center';
  ctx.textBaseline='alphabetic';ctx.fillStyle='rgba(70,78,110,.8)';
  const pgTxt=!isS2

// ═══ DRAW: STAGE 2 END ANIMATION ═══
function drawS2EndAnim(){
  if(!(allDone&&gameStage===2&&gameResult==='success'))return;
  const elapsed=2800-endTimer;
  const bldX=W-150;
  const doorX=bldX+72; // 문 중앙

  // 캐릭터: 문까지 달려온 후 멈춤 (문 통과 X)
  C.x=Math.min(doorX,CHAR_X+elapsed*0.24);

  const bldFade=Math.min(1,elapsed/700);
  ctx.save();ctx.globalAlpha=bldFade;

  // ── 건물 뒤쪽 벽 (캐릭터보다 먼저 그림) ──
  ctx.fillStyle='#EDE4D0';ctx.fillRect(bldX,GY-125,140,125);
  ctx.fillStyle='#E0D0B0';ctx.fillRect(bldX,GY-125,140,12);
  // 지붕
  ctx.fillStyle='#9B8DC0';
  ctx.beginPath();ctx.moveTo(bldX-6,GY-125);ctx.lineTo(bldX+70,GY-168);ctx.lineTo(bldX+146,GY-125);ctx.fill();
  // 창문
  for(let r=0;r<2;r++)for(let c2=0;c2<2;c2++){
    const wx=bldX+16+c2*52,wy=GY-108+r*48;
    ctx.fillStyle='#C8E8F5';ctx.fillRect(wx,wy,32,28);
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(wx+2,wy+2,14,8);
  }

  // ── 문 (열림) ──
  const doorOpen=Math.min(1,Math.max(0,(elapsed-600)/400));
  ctx.fillStyle='#8B5E3C';ctx.fillRect(bldX+52,GY-72,40,72); // 문틀
  ctx.fillStyle='#1A0800';ctx.fillRect(bldX+53,GY-71,36,70);  // 문 내부(어두운 안쪽)

  // 문 패널: 열려있음 (왼쪽으로 접힘)
  if(doorOpen<1){
    ctx.fillStyle='#A8734A';
    ctx.fillRect(bldX+53,GY-71,36*(1-doorOpen),70);
  }

  ctx.restore();

  // ── 캐릭터가 문 앞에 도달하면 문 안으로 들어가는 효과 ──
  // 캐릭터가 문 위치에 도착한 후 서서히 페이드 아웃 (문 안으로 사라짐)
  const charArrived=C.x>=doorX-4;
  const enterStart=elapsed-(2800-(2800-1600)); // 문 도착 이후 시간
  const enterT=charArrived?Math.min(1,(C.x-(doorX-4))/10):0;

  // 문이 열린 후 캐릭터가 들어가면 문 닫힘
  const closeStart=2100; // elapsed 기준
  const closeProg=elapsed>closeStart?Math.min(1,(elapsed-closeStart)/500):0;
  if(closeProg>0){
    ctx.save();ctx.globalAlpha=bldFade;
    ctx.fillStyle='#A8734A';
    // 문 패널이 오른쪽에서 닫혀옴
    ctx.fillRect(bldX+53+36*(1-closeProg),GY-71,36*closeProg,70);
    ctx.restore();
  }
}

function generateQRCode(){
  if(qrGenerated)return;
  qrGenerated=true;
  const url=QR_URL||window.location.href;
  const div=document.getElementById('qr-tmp');
  div.innerHTML='';
  try{
    new QRCode(div,{text:url,width:200,height:200,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});
    setTimeout(()=>{
      const cvs=div.querySelector('canvas');
      if(cvs){qrImg=new Image();qrImg.src=cvs.toDataURL('image/png');}
    },400);
  }catch(err){
    console.error('QR 생성 실패:',err);
    qrGenerated=false;
  }
}

function drawLobbyDropdown(type,cx,y0,w,h,items,selIdx){
  const x0=cx-w/2,isOpen=openDrop===type;
  const scroll=dropScroll[type]||0,needScroll=items.length>DROP_VISIBLE;
  const hover=mouseX>x0&&mouseX<x0+w&&mouseY>y0&&mouseY<y0+h&&!isOpen;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,.18)';rr(x0+2,y0+5,w,h,13);ctx.fill();
  // Bottom edge
  ctx.fillStyle=isOpen?'#1545A8':'#A05500';rr(x0,y0+4,w,h,13);ctx.fill();
  // Face
  const fg=ctx.createLinearGradient(x0,y0,x0,y0+h);
  if(isOpen){fg.addColorStop(0,'#5AAAF0');fg.addColorStop(1,'#2268D8');}
  else if(hover){fg.addColorStop(0,'#FFD870');fg.addColorStop(1,'#FFAA10');}
  else{fg.addColorStop(0,'#FFD060');fg.addColorStop(1,'#FF9500');}
  ctx.fillStyle=fg;rr(x0,y0,w,h,13);ctx.fill();
  // Glow border (no harsh gray)
  ctx.strokeStyle=isOpen?'rgba(120,180,255,.5)':'rgba(255,200,80,.4)';
  ctx.lineWidth=2;rr(x0,y0,w,h,13);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.24)';rr(x0+4,y0+3,w-8,h*.36,9);ctx.fill();
  // Selected text
  ctx.save();ctx.font="900 17px 'Jua','Noto Sans KR',sans-serif";ctx.textAlign='center';ctx.textBaseline='middle';ctx.lineJoin='round';
  ctx.lineWidth=3;ctx.strokeStyle='rgba(0,0,0,.2)';ctx.strokeText(items[selIdx],cx,y0+h/2);
  ctx.fillStyle='white';ctx.fillText(items[selIdx],cx,y0+h/2);ctx.textBaseline='alphabetic';ctx.restore();
  ctx.fillStyle='rgba(255,255,255,.75)';ctx.font="bold 11px sans-serif";ctx.textAlign='right';
  ctx.fillText(isOpen?'▲':'▼',x0+w-10,y0+h/2+5);

  if(!isOpen)return;
  const ly=y0+h+4,visCount=Math.min(items.length,DROP_VISIBLE);
  const listH=needScroll?DROP_ARROW_H+visCount*DROP_ITEM_H+DROP_ARROW_H:items.length*DROP_ITEM_H;
  ctx.fillStyle='rgba(0,0,0,.16)';rr(x0+3,ly+5,w,listH,13);ctx.fill();
  ctx.fillStyle='#FAFAFF';rr(x0,ly,w,listH,13);ctx.fill();
  ctx.strokeStyle='rgba(80,100,200,.2)';ctx.lineWidth=2;rr(x0,ly,w,listH,13);ctx.stroke();
  let itemTop=ly;
  if(needScroll){
    ctx.fillStyle=scroll>0?'#2563EB':'#C0C8D8';
    ctx.font="bold 13px sans-serif";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('▲',cx,ly+DROP_ARROW_H/2);ctx.textBaseline='alphabetic';
    itemTop=ly+DROP_ARROW_H;
  }
  ctx.save();rr(x0,itemTop,w,visCount*DROP_ITEM_H,0);ctx.clip();
  for(let i=scroll;i<Math.min(items.length,scroll+visCount);i++){
    const iy=itemTop+(i-scroll)*DROP_ITEM_H;
    // Hover highlight for item
    const itemHover=mouseX>x0&&mouseX<x0+w&&mouseY>iy&&mouseY<iy+DROP_ITEM_H;
    if(i===selIdx){ctx.fillStyle='#E8F0FF';ctx.fillRect(x0,iy,w,DROP_ITEM_H);}
    else if(itemHover){ctx.fillStyle='rgba(59,130,246,.08)';ctx.fillRect(x0,iy,w,DROP_ITEM_H);}
    else if((i-scroll)%2===1){ctx.fillStyle='rgba(0,0,0,.02)';ctx.fillRect(x0,iy,w,DROP_ITEM_H);}
    if(i>scroll){ctx.strokeStyle='rgba(100,120,200,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x0+10,iy);ctx.lineTo(x0+w-10,iy);ctx.stroke();}
    ctx.save();ctx.font=(i===selIdx?"900 ":"bold ")+"14px 'Jua','Noto Sans KR',sans-serif";
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=i===selIdx?'#1D4ED8':'#374151';
    ctx.fillText(items[i],cx,iy+DROP_ITEM_H/2);ctx.textBaseline='alphabetic';ctx.restore();
  }
  ctx.restore();
  if(needScroll){
    const ay=itemTop+visCount*DROP_ITEM_H,canDown=scroll+DROP_VISIBLE<items.length;
    ctx.fillStyle=canDown?'#2563EB':'#C0C8D8';ctx.font="bold 13px sans-serif";ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('▼',cx,ay+DROP_ARROW_H/2);ctx.textBaseline='alphabetic';
  }
}

function drawHowToPopup(){

  // Rows: [iconType, keyText, valueText]
  // iconType: 'up'|'down'|'cone'|'puddle'|'villain'|'fever'

    ['fever', '스테이지 클리어','FEVER TIME! ×2'],

  const RH=46;

      }
      ctx.fillStyle='#FF6B00';ctx.beginPath();ctx.arc(0,0,5,0,Math.PI*2);ctx.fill();

    else{ctx.scale(icon==='puddle'?.65:.55,.55);drawMiniObs(icon);}

    ctx.fillStyle='#1E293B';ctx.textAlign='right';ctx.fillText(val,px+pw-20,iy+RH*.68);ctx.restore();

  ctx.strokeStyle=ok?'#7DD3FC':'rgba(200,50,50,.3)';
  ctx.lineWidth=3;rr(px,popupY,pw,ph,26);ctx.stroke();
  ctx.fillStyle='rgba(248,250,255,.5)';rr(px+8,popupY+8,pw-16,ph*.14,20);ctx.fill();

  // ── 헤더 (고정) ──
  ctx.save();ctx.font="900 30px 'Black Han Sans','Nunito',sans-serif";ctx.textAlign='center';ctx.lineJoin='round';
  const tc=ok?'#2563EB':'#DC2626';
  ctx.lineWidth=6;ctx.strokeStyle=ok?'rgba(100,190,255,.65)':'rgba(220,80,80,.45)';
  ctx.strokeText(ok?'Mission Completed! 🎉':'Game Over 😔',W/2,popupY+46);
  ctx.fillStyle=tc;ctx.fillText(ok?'Mission Completed! 🎉':'Game Over 😔',W/2,popupY+46);ctx.restore();

  ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px+16,popupY+60);ctx.lineTo(px+pw-16,popupY+60);ctx.stroke();

  ctx.save();ctx.font="bold 17px 'Nanum Square','Nunito',sans-serif";ctx.textAlign='center';
  ctx.fillStyle='#334155';ctx.fillText('Score',W/2,popupY+80);ctx.restore();
  ctx.save();ctx.font="900 28px 'Nunito',sans-serif";ctx.textAlign='center';ctx.lineJoin='round';
  ctx.fillStyle='#1E293B';ctx.fillText(displayScore,W/2,popupY+110);ctx.restore();

  ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px+16,popupY+122);ctx.lineTo(px+pw-16,popupY+122);ctx.stroke();

  const headerH=126;

  // ── 단어 목록 영역 (스크롤 가능) ──
  const btnAreaH=62;
  const listH=ph-headerH-btnAreaH;
  const listTop=popupY+headerH;
  const missedWords=wordList.filter(w=>!collected.find(cc=>cc.word===w.word));
  const cw2=(pw-36)/2,rh=28;

  // 전체 콘텐츠 높이 계산
  let contentH=0;
  if(collected.length>0) contentH+=20+Math.ceil(collected.length/2)*rh+6;
  if(missedWords.length>0) contentH+=20+Math.ceil(missedWords.length/2)*rh+6;
  else if(collected.length>0&&ok) contentH+=30;

  resultMaxScrollY=Math.max(0,contentH-listH+8);

  // 클립 영역 설정
  ctx.save();
  ctx.beginPath();rr(px+6,listTop,pw-12,listH,6);ctx.clip();

  let dy=listTop-resultScrollY;

  // 획득 단어
  if(collected.length>0){
    if(dy+20>listTop-5){
      ctx.save();ctx.font="bold 15px 'Nanum Square','Jua',sans-serif";ctx.textAlign='left';
      ctx.fillStyle='#22C55E';ctx.fillText('✅ 획득 단어 ('+collected.length+')',px+16,dy+16);ctx.restore();
    }
    dy+=20;
    for(let i=0;i<collected.length;i++){
      const col=i%2,row=Math.floor(i/2);
      const ix=px+10+col*cw2,iy=dy+row*rh;
      if(iy+rh>listTop&&iy<listTop+listH){
        ctx.fillStyle='rgba(34,197,94,.09)';rr(ix,iy,cw2-6,rh-2,4);ctx.fill();
        const ww=collected[i];const em=getEM(ww.word,ww.ko)||'';
        ctx.save();ctx.font="13px 'Nanum Square','Noto Sans KR',sans-serif";
        ctx.textAlign='left';ctx.fillStyle='#1E4030';
        let str=em+' '+dispWord(ww.word)+': '+ww.ko;
        if(ctx.measureText(str).width>cw2-16)ctx.font="11px 'Nanum Square','Noto Sans KR',sans-serif";
        ctx.fillText(str,ix+5,iy+rh-7,cw2-14);ctx.restore();
      }
    }
    dy+=Math.ceil(collected.length/2)*rh+6;
  }

  // 미획득 단어
  if(missedWords.length>0){
    if(dy+20>listTop-5){
      ctx.save();ctx.font="bold 15px 'Nanum Square','Jua',sans-serif";ctx.textAlign='left';
      ctx.fillStyle='#EF4444';ctx.fillText('❌ 미획득 단어 ('+missedWords.length+')',px+16,dy+16);ctx.restore();
    }
    dy+=20;
    for(let i=0;i<missedWords.length;i++){
      const col=i%2,row=Math.floor(i/2);
      const ix=px+10+col*cw2,iy=dy+row*rh;
      if(iy+rh>listTop&&iy<listTop+listH){
        ctx.fillStyle='rgba(0,0,0,.04)';rr(ix,iy,cw2-6,rh-2,4);ctx.fill();
        const ww=missedWords[i];const em=getEM(ww.word,ww.ko)||'';
        // 이모지: 회색 처리
        if(em){
          ctx.save();
          ctx.globalAlpha=0.38;
          ctx.globalCompositeOperation='source-over';
          ctx.font="15px serif";ctx.textAlign='left';ctx.textBaseline='middle';
          ctx.fillStyle='black';
          ctx.fillText(em,ix+4,iy+rh/2-1);
          ctx.restore();
        }
        // 텍스트: 일반 출력
        ctx.save();ctx.font="13px 'Nanum Square','Noto Sans KR',sans-serif";
        ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.fillStyle='#94A3B8';
        const noEmStr=' '+dispWord(ww.word)+': '+ww.ko;
        if(ctx.measureText((em||'')+noEmStr).width>cw2-16)ctx.font="11px 'Nanum Square','Noto Sans KR',sans-serif";
        ctx.fillText(noEmStr,ix+(em?20:5),iy+rh-7,cw2-(em?26:14));ctx.restore();
      }
    }
    dy+=Math.ceil(missedWords.length/2)*rh+6;
  }

  ctx.restore(); // 클립 해제

  // 스크롤 가능할 때 페이드 + 스크롤바
  if(resultMaxScrollY>0){
    // 하단 페이드 (버튼 경계 자연스럽게)
    const fg=ctx.createLinearGradient(0,listTop+listH-28,0,listTop+listH);
    fg.addColorStop(0,'rgba(250,250,255,0)');fg.addColorStop(1,'rgba(250,250,255,.98)');
    ctx.fillStyle=fg;ctx.fillRect(px+7,listTop+listH-28,pw-14,28);

    // 스크롤바 트랙
    const sbX=px+pw-10,sbH=listH-8;
    ctx.fillStyle='rgba(0,0,0,.07)';rr(sbX,listTop+4,6,sbH,3);ctx.fill();
    // 스크롤바 썸
    const thumbH=Math.max(24,sbH*(listH/contentH));
    const thumbY=listTop+4+(sbH-thumbH)*(resultScrollY/resultMaxScrollY);
    ctx.fillStyle='rgba(100,130,210,.5)';rr(sbX,thumbY,6,thumbH,3);ctx.fill();


  }

  // 구분선 (리스트 / 버튼 경계)
  ctx.strokeStyle='rgba(0,0,0,.07)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(px+16,popupY+ph-btnAreaH);ctx.lineTo(px+pw-16,popupY+ph-btnAreaH);ctx.stroke();

  // ── 버튼 (고정, 항상 하단) ──
  const by=popupY+ph-btnAreaH+10;
  // 완료하기 (왼쪽)
  ctx.fillStyle='rgba(0,0,0,.14)';rr(px+16,by+4,152,42,21);ctx.fill();
  const dg=ctx.createLinearGradient(px+14,by,px+14,by+42);dg.addColorStop(0,'#64A8FF');dg.addColorStop(1,'#3B72F6');
  ctx.fillStyle=dg;rr(px+14,by,152,42,21);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;rr(px+16,by+2,148,38,20);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.2)';rr(px+19,by+4,142,13,9);ctx.fill();
  ctx.save();ctx.font="900 14px 'Nunito',sans-serif";ctx.textAlign='center';ctx.lineJoin='round';
  ctx.lineWidth=4;ctx.strokeStyle='rgba(0,50,160,.25)';ctx.strokeText('✅ 완료하기',px+90,by+27);
  ctx.fillStyle='white';ctx.fillText('✅ 완료하기',px+90,by+27);ctx.restore();
  // 다시하기 (오른쪽)
  ctx.fillStyle='rgba(0,0,0,.16)';rr(px+pw-168,by+4,152,42,21);ctx.fill();
  const rg=ctx.createLinearGradient(px+pw-170,by,px+pw-170,by+42);rg.addColorStop(0,'#60D090');rg.addColorStop(1,'#18A058');
  ctx.fillStyle=rg;rr(px+pw-170,by,152,42,21);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;rr(px+pw-168,by+2,148,38,20);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.2)';rr(px+pw-165,by+4,142,13,9);ctx.fill();
  ctx.save();ctx.font="900 14px 'Nunito',sans-serif";ctx.textAlign='center';ctx.lineJoin='round';
  ctx.lineWidth=4;ctx.strokeStyle='rgba(0,80,0,.25)';ctx.strokeText('🔄 다시하기',px+pw-94,by+27);
  ctx.fillStyle='white';ctx.fillText('🔄 다시하기',px+pw-94,by+27);ctx.restore();
}

// ═══ INPUT ═══
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  mouseX=(e.clientX-rect.left)*W/rect.width;
  mouseY=(e.clientY-rect.top)*H/rect.height;
});

function doJump(){
  if(C.onGround&&!C.entering&&popupTimer<=0){
    C.vy=JUMP_V;C.onGround=false;jumpCount=1;sfx.jump();spawnDust(C.x,GY,7);
  } else if(jumpCount===1&&!C.onGround&&!C.entering){
    C.vy=JUMP_V2;jumpCount=2;sfx.jump2();spawnDust(C.x,C.y,5);
    isDoubleJumping=true;doubleJumpSpin=0;
  }
}
window.addEventListener('keydown',e=>{
  if(['Space','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();
  if(scene==='GAME'){
    if(e.code==='Space'||e.code==='ArrowUp')doJump();
    if(e.code==='ArrowDown'&&C.onGround&&!C.entering)C.sliding=true;
    if(e.code==='KeyM')toggleBGM();
  }
  if(e.code==='Space'&&scene==='LOBBY'){initAudio();if(!openDrop&&!showHowTo)startGame();}
});
window.addEventListener('keyup',e=>{if(e.code==='ArrowDown')C.sliding=false;});

let tsy=0,tsyResult=0;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();tsy=e.touches[0].clientY;tsyResult=e.touches[0].clientY;
  const rect=canvas.getBoundingClientRect();
  handleClick((e.touches[0].clientX-rect.left)*W/rect.width,(e.touches[0].clientY-rect.top)*H/rect.height);
},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();if(scene==='GAME')C.sliding=false;},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();const dy=e.touches[0].clientY-tsy;
  if(scene==='GAME'&&popupTimer<=0){
    if(dy<-30)doJump();
    if(dy>30&&C.onGround)C.sliding=true;
  }
},{passive:false});
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  handleClick((e.clientX-rect.left)*W/rect.width,(e.clientY-rect.top)*H/rect.height);
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  if(scene==='RESULT'){
    resultScrollY=Math.max(0,Math.min(resultMaxScrollY,resultScrollY+e.deltaY*.45));
    return;
  }
  e.preventDefault();if(scene!=='LOBBY')return;
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*W/rect.width,my=(e.clientY-rect.top)*H/rect.height;
  const dir=e.deltaY>0?1:-1;
  if(openDrop){const items=openDrop==='grade'?GRADES:UNITS;dropScroll[openDrop]=Math.max(0,Math.min(Math.max(0,items.length-DROP_VISIBLE),(dropScroll[openDrop]||0)+dir));}
  else{
    if(mx>167&&mx<343&&my>182&&my<226)gIdx=Math.max(0,Math.min(GRADES.length-1,gIdx+dir));
    if(mx>457&&mx<633&&my>182&&my<226)uIdx=Math.max(0,Math.min(UNITS.length-1,uIdx+dir));
  }
},{passive:false});

function handleDropClick(type,cx,cx2,cy){
  const x0=cx-88,ly=228;
  if(cx2<x0||cx2>x0+176)return false;
  const items=type==='grade'?GRADES:UNITS;
  const needScroll=items.length>DROP_VISIBLE;
  if(!needScroll){
    if(cy>=ly&&cy<ly+items.length*DROP_ITEM_H){
      const idx=Math.floor((cy-ly)/DROP_ITEM_H);
      if(idx>=0&&idx<items.length){sfx.uiSelect();if(type==='grade')gIdx=idx;else uIdx=idx;openDrop=null;return true;}
    }
  } else {
    if(cy>=ly&&cy<ly+DROP_ARROW_H){dropScroll[type]=Math.max(0,(dropScroll[type]||0)-1);return true;}
    const it=ly+DROP_ARROW_H;
    if(cy>=it&&cy<it+DROP_VISIBLE*DROP_ITEM_H){
      const idx=Math.floor((cy-it)/DROP_ITEM_H)+(dropScroll[type]||0);
      if(idx>=0&&idx<items.length){sfx.uiSelect();if(type==='grade')gIdx=idx;else uIdx=idx;openDrop=null;return true;}
    }
    const da=it+DROP_VISIBLE*DROP_ITEM_H;
    if(cy>=da&&cy<da+DROP_ARROW_H){dropScroll[type]=Math.min(items.length-DROP_VISIBLE,(dropScroll[type]||0)+1);return true;}
  }
  return false;
}

function handleClick(x,y){
  initAudio();
  if(scene==='LOBBY'){
    if(showHowTo){
      const pw=490,ph=380,px2=W/2-pw/2,py2=H/2-ph/2-8;
      const cx2=px2+pw-20,cy2=py2+22;
      if(Math.hypot(x-cx2,y-cy2)<18||x<px2||x>px2+pw||y<py2||y>py2+ph){
        showHowTo=false;sfx.uiClick();
      }
      return;
    }
    if(openDrop){
      if(handleDropClick(openDrop,openDrop==='grade'?255:545,x,y))return;
      const cx2=openDrop==='grade'?255:545;
      if(x>=cx2-88&&x<=cx2+88&&y>=182&&y<=226){openDrop=null;return;}
      openDrop=null;
    }
    if(x>=167&&x<=343&&y>=182&&y<=226){sfx.uiClick();openDrop='grade';return;}
    if(x>=457&&x<=633&&y>=182&&y<=226){sfx.uiClick();openDrop='unit';return;}
    if(x>=310&&x<=490&&y>=254&&y<=296){sfx.uiClick();showHowTo=true;return;}
    if(x>=278&&x<=522&&y>=353&&y<=407){startGame();return;}
    if(x>=W-100&&x<=W-8&&y>=H-54&&y<=H-16&&!showQR){showQR=true;qrGenerated=false;qrImg=null;sfx.uiClick();return;}
    if(showQR){const qpx=W/2-150,qpy=H/2-160;if(Math.hypot(x-(qpx+300-16),y-(qpy+16))<16||x<qpx||x>qpx+300||y<qpy||y>qpy+320){showQR=false;}return;}
    if(x<45&&y<40)toggleBGM();
  }
  if(scene==='GAME'){
    if(x>=4&&x<=38&&y>=74&&y<=108)toggleBGM();
    if(x>=W-38&&x<=W-4&&y>=74&&y<=108){scene='LOBBY';coins=[];obstacles=[];particles=[];specialItems=[];stopBGM();return;}
  }
  if(scene==='RESULT'){
    // 고정 팝업 좌표: pw=520, ph=440, popupY=max(8,H/2-220)
    const _rpw=520,_rph=440,_rpx=W/2-260,_rpy=Math.max(8,H/2-220);
    const _rby=_rpy+_rph-52; // 버튼 y (408)
    if(y>=_rby-4&&y<=_rby+46){
      if(x>=_rpx+10&&x<=_rpx+170){ // 완료하기
        scene='LOBBY';coins=[];obstacles=[];particles=[];
        openDrop=null;typeIdx=0;stopBGM();specialItems=[];resultScrollY=0;
        return;
      }
      if(x>=_rpx+_rpw-172&&x<=_rpx+_rpw-10){ // 다시하기
        startGame();return;
      }
    }
    return;
  }
}

// ═══ GAME LOOP ═══
let lt=0;
function loop(ts){
  const dt=Math.min(ts-lt,50);lt=ts;
  ctx.clearRect(0,0,W,H);

  // Typewriter (runs in lobby)
  if(scene==='LOBBY'){
    typeTimer2+=dt;
    if(typeTimer2>=TYPE_SPEED){
      typeTimer2=0;typeIdx++;
      if(typeIdx>TYPE_TEXT.length+15)typeIdx=0;
    }
    // 캐릭터 눈 깜박임 / 입 움직임 애니메이션
    charBlinkTimer+=dt;
    if(charBlinkPhase===0&&charBlinkTimer>2200+Math.random()*2000){charBlinkPhase=1;charBlinkTimer=0;}
    if(charBlinkPhase===1&&charBlinkTimer>70){charBlinkPhase=2;charBlinkTimer=0;}
    if(charBlinkPhase===2&&charBlinkTimer>110){charBlinkPhase=3;charBlinkTimer=0;}
    if(charBlinkPhase===3&&charBlinkTimer>70){charBlinkPhase=0;charBlinkTimer=0;}
    charMouthBob=Math.sin(Date.now()*.0015)*1.8;
  }

  if(scene==='LOBBY'){drawLobby();}
  else if(scene==='GAME'){
    update(dt);drawBG();drawDustParticles();drawParticles();
    for(const o of obstacles)drawObstacle(o);
    for(const c of coins)drawCoin(c);
    drawSpecialItems();drawChar();drawHUD();drawPopup();drawFloaters();drawStageTransition();drawS2EndAnim();
  } else if(scene==='RESULT'){
    drawBG();
    for(const o of obstacles)drawObstacle(o);
    for(const c of coins)drawCoin(c);
    if(gameResult!=='success'&&gameResult!=='fail')drawChar();
    drawHUD();
    const _bp=charBlinkPhase;charBlinkPhase=0;drawResultPopup();charBlinkPhase=_bp;
  }
  requestAnimationFrame(loop);
}
document.fonts.ready.then(()=>{requestAnimationFrame(ts=>{lt=ts;requestAnimationFrame(loop);});});
</script>
